events {
    worker_connections 1024;
}

http {
    # ==================== UPSTREAM (target service di belakang gateway) ====================

    upstream auth_service {
        server auth-service:8081;
    }

    upstream product_service {
        server product-service:8083;
    }

    upstream order_service {
        server order-service:8082;
    }

    upstream email_service {
        server email-service:8084;
    }

    upstream eureka_service {
        server eureka-server:8761;
    }

    # ==================== API GATEWAY (single entry point, port 80) ====================

    server {
        listen 80;

        # Logging khusus gateway, supaya kelihatan request masuk lewat endpoint apa
        access_log /var/log/nginx/gateway-access.log;
        error_log  /var/log/nginx/gateway-error.log;

        # ---- Auth Service ----
        # Semua request /api/auth/** dan /api/users/** diarahkan ke auth-service
        location /api/auth/ {
            proxy_pass http://auth_service/api/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/users/ {
            proxy_pass http://auth_service/api/users/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ---- Product Service ----
        # Request /products diarahkan ke product-service
        location /products {
            proxy_pass http://product_service/products;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ---- Order Service ----
        # Request /orders diarahkan ke order-service (termasuk header Authorization untuk JWT)
        location /orders {
            proxy_pass http://order_service/orders;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Authorization $http_authorization;
        }

        # ---- Email Service (actuator/monitoring saja, tidak ada endpoint publik) ----
        location /api/email/health {
            proxy_pass http://email_service/actuator/health;
            proxy_set_header Host $host;
        }

        # ---- Eureka Dashboard (opsional, untuk lihat status registrasi service) ----
        location /eureka-dashboard/ {
            proxy_pass http://eureka_service/;
            proxy_set_header Host $host;
        }

        # ---- Health check gateway itu sendiri ----
        location /gateway/health {
            access_log off;
            return 200 "API Gateway is healthy\n";
            add_header Content-Type text/plain;
        }

        # ---- Default: endpoint tidak dikenal ----
        location / {
            return 404 '{"error": "Endpoint tidak ditemukan di API Gateway. Gunakan /api/auth/, /products, /orders, dst."}';
            add_header Content-Type application/json;
        }
    }
}
