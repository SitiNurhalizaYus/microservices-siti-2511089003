input {
  beats {
    port => 5044
  }
}

filter {
  # Filebeat membaca file log dari shared volume app-logs (bind mount langsung,
  # bukan docker autodiscover), jadi field [log][file][path] berisi path lengkap
  # file di dalam container Filebeat, contoh: /var/log/app/auth-service.log
  # Nama file (tanpa ekstensi .log) dipakai sebagai nama service.
  if [log][file][path] {
    grok {
      match => { "[log][file][path]" => "/var/log/app/(?<service_name>[a-zA-Z0-9_-]+)\.log" }
      tag_on_failure => ["_service_name_grok_failure"]
    }
  }

  if ![service_name] {
    mutate {
      add_field => { "service_name" => "unknown" }
    }
  }

  # Parse format log standar Spring Boot:
  # 2026-06-28 10:00:00.123 [main] INFO  com.siti.auth.AuthApplication - Started...
  grok {
    match => {
      "message" => "%{TIMESTAMP_ISO8601:log_timestamp}\s+\[%{DATA:thread}\]\s+%{LOGLEVEL:log_level}\s+%{DATA:logger_name}\s+-\s+%{GREEDYDATA:log_message}"
    }
    tag_on_failure => ["_grok_parse_failure"]
  }

  date {
    match => ["log_timestamp", "yyyy-MM-dd HH:mm:ss.SSS"]
    target => "@timestamp"
  }
}

output {
  # Index terpisah per service per hari, sesuai arahan dosen:
  # logging dipisah per service, tapi tetap satu Elasticsearch & satu Kibana.
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "microservices-%{service_name}-%{+YYYY.MM.dd}"
  }

  # Aktifkan baris ini sementara kalau perlu debug pipeline Logstash:
  # stdout { codec => rubydebug }
}
