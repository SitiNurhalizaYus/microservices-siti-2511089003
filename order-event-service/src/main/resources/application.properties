spring.application.name=order-event-service
server.port=8085

# H2 in-memory database - sengaja dipakai untuk service demo terpisah ini
# (bukan MySQL), supaya tidak menambah satu instance MySQL lagi yang berat
# hanya untuk keperluan demo konsep Event Sourcing & CQRS.
spring.datasource.url=jdbc:h2:mem:eventstore;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Swagger/OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
