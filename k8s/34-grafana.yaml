apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: microservices-siti
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: "admin"
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin"
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "false"
          volumeMounts:
            - name: grafana-datasource-volume
              mountPath: /etc/grafana/provisioning/datasources/datasource.yml
              subPath: datasource.yml
            - name: grafana-dashboard-provider-volume
              mountPath: /etc/grafana/provisioning/dashboards/dashboard-provider.yml
              subPath: dashboard-provider.yml
            - name: grafana-dashboard-json-volume
              mountPath: /etc/grafana/provisioning/dashboards/microservices-overview.json
              subPath: microservices-overview.json
            - name: grafana-storage
              mountPath: /var/lib/grafana
      volumes:
        - name: grafana-datasource-volume
          configMap:
            name: grafana-datasource-config
        - name: grafana-dashboard-provider-volume
          configMap:
            name: grafana-dashboard-provider-config
        - name: grafana-dashboard-json-volume
          configMap:
            name: grafana-dashboard-json
        - name: grafana-storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: microservices-siti
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: grafana-nodeport
  namespace: microservices-siti
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30300
  type: NodePort
