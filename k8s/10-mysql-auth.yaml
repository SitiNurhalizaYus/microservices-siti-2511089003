apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-auth-pvc
  namespace: microservices-siti
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-auth
  namespace: microservices-siti
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql-auth
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: mysql-auth
    spec:
      containers:
        - name: mysql-auth
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_DATABASE
              value: "authdb"
            - name: MYSQL_ALLOW_EMPTY_PASSWORD
              value: "yes"
          volumeMounts:
            - name: mysql-auth-storage
              mountPath: /var/lib/mysql
          readinessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "localhost"]
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "localhost"]
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: mysql-auth-storage
          persistentVolumeClaim:
            claimName: mysql-auth-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-auth
  namespace: microservices-siti
spec:
  selector:
    app: mysql-auth
  ports:
    - port: 3306
      targetPort: 3306
  type: ClusterIP
